services:
  mahoroba-app-tree:
    build: .
    image: mahoroba-app-tree:latest
    container_name: mahoroba-app-tree
    restart: unless-stopped
    ports:
      - "127.0.0.1:3002:3002"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3002
    volumes:
      - ./docs/pdf:/app/docs/pdf:ro
      - ./docs-index:/app/docs-index:ro
      - ./logs:/app/logs
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3002/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    user: "1000:1000"
    read_only: false
    security_opt:
      - no-new-privileges:true
    networks:
      - mahoroba-net

networks:
  mahoroba-net:
    external: true
