<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>mahoroba-app-tree | 共通ログイン</title>
<link rel="stylesheet" href="/static/css/common.css" />
</head>
<body class="login-page">
  <main class="login-card">
    <h1>mahoroba-app-tree</h1>
    <p class="subtitle">社員共通ポータル</p>
    <form id="loginForm" autocomplete="on">
      <label>
        <span>ID</span>
        <input type="text" id="loginId" name="id" required maxlength="64" autocomplete="username" />
      </label>
      <label>
        <span>パスワード</span>
        <input type="password" id="loginPass" name="password" required maxlength="128" autocomplete="current-password" />
      </label>
      <button type="submit">ログイン</button>
      <p id="errorMsg" class="error" hidden></p>
    </form>
  </main>
  <script src="/static/js/login.js" defer></script>
</body>
</html>
